directory:
  pair_dir: "data/processed/pairs_meta"
  dataset_dir: "data/processed/pairs_meta_all/"
  dataset_dir_train: "data/processed/train/"
  dataset_dir_validation: "data/processed/validation/"
  satellite_map_suffix: "-satellite_map.png"
  heightmap_suffix: "-height_map.png"
  model_path: "data/localizer/model_6.pth"
  checkpoint_dir: "data/localizer/checkpoints_6/"
  tensorboard_dir: "data/localizer/tensor_board_6/"
  dir_name: "data/localizer/"

train_parameters:
  epochs: 100
  batch_size: 32
  learning_rate: 1e-4
  weight_decay: 0
  lr_drop_factor: 0.5
  lr_drop_patience: 3
  lr_drop_min: 1e-8
  test_ratio: 0.1
  sigma: 1.5

model_parameters:
  embedding_dim: 128
  dropout: 0.2
  load_model: False

dataset_parameters:
  dataset_size: 50000
  sigma: 1.5

augments:
  satellite_map_augment_max_angle: 5
  min_brightness_ratio: 0.7
  max_brightness_ratio: 1.3
  min_contrast_ratio: 0.7
  max_contrast_ratio: 1.3
  min_saturation_ratio: 0.7
  max_saturation_ratio: 1.3
  noise_ratio: 0.01
  heightmap_augment_max_angle: 5
  radial_black_pixels_prob: 0.5
  radial_drop_prob: 0.85